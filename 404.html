<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — Page Not Found | DevHeal Labs AI</title>
<meta name="description" content="The page you're looking for doesn't exist.">
<link rel="icon" type="image/jpeg" href="logo.jpeg">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#0a0a0f;
  --bg-card:#12121a;
  --cyan:#00d4ff;
  --purple:#7c3aed;
  --text:#e4e4e7;
  --text-muted:#71717a;
  --border:#1e1e2e;
  --gradient:linear-gradient(135deg,var(--cyan),var(--purple));
}
html{font-size:16px}
body{
  background:var(--bg);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  line-height:1.6;
  min-height:100vh;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  overflow:hidden;
  position:relative;
}
a{color:var(--cyan);text-decoration:none;transition:opacity .2s}
a:hover{opacity:.85}
.gradient-text{background:var(--gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}

/* Background glow effects */
body::before{
  content:'';position:absolute;top:-200px;right:-200px;
  width:500px;height:500px;
  background:radial-gradient(circle,rgba(0,212,255,.06) 0%,transparent 70%);
  pointer-events:none;
}
body::after{
  content:'';position:absolute;bottom:-150px;left:-150px;
  width:400px;height:400px;
  background:radial-gradient(circle,rgba(124,58,237,.06) 0%,transparent 70%);
  pointer-events:none;
}

.container{
  text-align:center;
  position:relative;
  z-index:1;
  padding:24px;
  max-width:560px;
}

.error-code{
  font-size:clamp(6rem,15vw,10rem);
  font-weight:900;
  letter-spacing:-.05em;
  line-height:1;
  margin-bottom:16px;
}

h1{
  font-size:clamp(1.4rem,3vw,1.8rem);
  font-weight:700;
  margin-bottom:12px;
  letter-spacing:-.02em;
}

p{
  color:var(--text-muted);
  font-size:1.05rem;
  margin-bottom:36px;
  max-width:420px;
  margin-left:auto;
  margin-right:auto;
}

.btn{
  display:inline-flex;align-items:center;gap:8px;
  padding:12px 28px;border-radius:8px;
  font-size:.95rem;font-weight:600;
  transition:transform .2s,box-shadow .2s;
  cursor:pointer;border:none;
  background:var(--gradient);color:#fff;
}
.btn:hover{
  transform:translateY(-2px);
  box-shadow:0 8px 30px rgba(0,212,255,.25);
  opacity:1;
}

.links{
  margin-top:48px;
  display:flex;
  gap:24px;
  justify-content:center;
  flex-wrap:wrap;
}
.links a{
  color:var(--text-muted);
  font-size:.88rem;
  transition:color .2s;
}
.links a:hover{color:var(--text);opacity:1}

.logo{
  position:absolute;
  top:24px;
  left:24px;
  font-size:1.2rem;
  font-weight:700;
  letter-spacing:-.02em;
}
.logo span{color:var(--cyan)}

@keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .6s ease forwards}
.d1{animation-delay:.1s;opacity:0}
.d2{animation-delay:.2s;opacity:0}
.d3{animation-delay:.3s;opacity:0}
.d4{animation-delay:.4s;opacity:0}
</style>
</head>
<body>

<div class="logo"><a href="/" style="color:inherit;display:flex;align-items:center;gap:10px"><img src="logo.jpeg" alt="DevHeal Labs AI" style="width:36px;height:36px;border-radius:10px;object-fit:contain"> DevHeal Labs</a></div>

<div class="container">
  <div class="error-code gradient-text fade-up">404</div>
  <h1 class="fade-up d1">Page not found</h1>
  <p class="fade-up d2">The page you are looking for does not exist or has been moved. Let's get you back on track.</p>
  <a href="/" class="btn fade-up d3">
    Back to Homepage
    <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
  </a>
  <div class="links fade-up d4">
    <a href="https://nc.devheallabs.in" target="_blank" rel="noopener">NC Language</a>
    <a href="https://github.com/DevHeal-Labs" target="_blank" rel="noopener">GitHub</a>
    <a href="mailto:hello@devheallabs.in">Contact</a>
  </div>
</div>

</body>
</html>
